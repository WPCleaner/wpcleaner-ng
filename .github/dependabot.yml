version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - WPCleaner
    commit-message:
      prefix: Dependabot
      include: scope
    reviewers:
      - WPCleaner
  - package-ecosystem: gradle
    directory: "/build-logic"
    schedule:
      interval: weekly
    assignees:
      - WPCleaner
    commit-message:
      prefix: Dependabot
      include: scope
    reviewers:
      - WPCleaner
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - WPCleaner
    commit-message:
      prefix: Dependabot
      include: scope
    reviewers:
      - WPCleaner
